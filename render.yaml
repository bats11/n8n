services:
  - type: web
    name: n8n-illustratore
    env: docker
    plan: free
    region: frankfurt
    healthCheckPath: /healthz
    numInstances: 1
    envVars:
      - key: N8N_ENCRYPTION_KEY
        value: una-tua-parola-segreta-molto-lunga # CAMBIA QUESTA PAROLA!
      - key: DB_TYPE
        value: postgresdb
      - key: DB_POSTGRESDB_DATABASE
        fromDatabase:
          name: n8n-db
          property: database
      - key: DB_POSTGRESDB_HOST
        fromDatabase:
          name: n8n-db
          property: host
      - key: DB_POSTGRESDB_PORT
        fromDatabase:
          name: n8n-db
          property: port
      - key: DB_POSTGRESDB_USER
        fromDatabase:
          name: n8n-db
          property: user
      - key: DB_POSTGRESDB_PASSWORD
        fromDatabase:
          name: n8n-db
          property: password
      - key: N8N_HOST
        fromService:
          type: web
          name: n8n-illustratore
          property: host

databases:
  - name: n8n-db
    plan: free
    region: frankfurt